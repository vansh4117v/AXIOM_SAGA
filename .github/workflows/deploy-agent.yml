name: Deploy Agent

on:
  push:
    branches: [master]
    paths:
      - "agent/**"
      - ".github/workflows/deploy-agent.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Agent
        uses: azure/webapps-deploy@v3
        with:
          app-name: sage-agent-1508
          publish-profile: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE }}
          package: ./agent
