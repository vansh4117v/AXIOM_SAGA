name: Deploy Gateway

on:
  push:
    branches: [master]
    paths:
      - "gateway/**"
      - ".github/workflows/deploy-gateway.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Gateway
        uses: azure/webapps-deploy@v3
        with:
          app-name: sage-gateway-1508
          publish-profile: ${{ secrets.AZURE_GATEWAY_PUBLISH_PROFILE }}
          package: ./gateway
